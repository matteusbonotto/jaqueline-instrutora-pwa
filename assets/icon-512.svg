<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="carGradient512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#carGradient512)" rx="60"/>
  
  <!-- Carro -->
  <g transform="translate(256, 256)">
    <!-- Corpo do carro -->
    <path d="M-130,-50 L130,-50 L145,-25 L160,25 L145,50 L-145,50 L-160,25 L-145,-25 Z" 
          fill="#00ff00" stroke="#00cc00" stroke-width="5"/>
    
    <!-- Janelas -->
    <rect x="-110" y="-40" width="65" height="30" fill="#111111" opacity="0.7" rx="5"/>
    <rect x="45" y="-40" width="65" height="30" fill="#111111" opacity="0.7" rx="5"/>
    
    <!-- Rodas -->
    <circle cx="-95" cy="50" r="32" fill="#333333" stroke="#111111" stroke-width="5"/>
    <circle cx="95" cy="50" r="32" fill="#333333" stroke="#111111" stroke-width="5"/>
    <circle cx="-95" cy="50" r="22" fill="#111111"/>
    <circle cx="95" cy="50" r="22" fill="#111111"/>
    
    <!-- Detalhes -->
    <line x1="-130" y1="-50" x2="130" y2="-50" stroke="#00cc00" stroke-width="4"/>
    <line x1="-80" y1="-50" x2="-80" y2="25" stroke="#111111" stroke-width="3"/>
    <line x1="80" y1="-50" x2="80" y2="25" stroke="#111111" stroke-width="3"/>
    
    <!-- Faróis -->
    <circle cx="-130" cy="-25" r="8" fill="#ffff00"/>
    <circle cx="130" cy="-25" r="8" fill="#ffff00"/>
  </g>
  
  <!-- Texto "CNH" -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="42" font-weight="bold" 
        fill="#00ff00" text-anchor="middle">CNH</text>
</svg>
