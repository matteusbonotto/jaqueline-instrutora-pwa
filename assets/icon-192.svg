<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" fill="url(#carGradient)" rx="20"/>
  
  <!-- Carro -->
  <g transform="translate(96, 96)">
    <!-- Corpo do carro -->
    <path d="M-50,-20 L50,-20 L55,-10 L60,10 L55,20 L-55,20 L-60,10 L-55,-10 Z" 
          fill="#00ff00" stroke="#00cc00" stroke-width="2"/>
    
    <!-- Janelas -->
    <rect x="-40" y="-15" width="25" height="12" fill="#111111" opacity="0.7" rx="2"/>
    <rect x="15" y="-15" width="25" height="12" fill="#111111" opacity="0.7" rx="2"/>
    
    <!-- Rodas -->
    <circle cx="-35" cy="20" r="12" fill="#333333" stroke="#111111" stroke-width="2"/>
    <circle cx="35" cy="20" r="12" fill="#333333" stroke="#111111" stroke-width="2"/>
    <circle cx="-35" cy="20" r="8" fill="#111111"/>
    <circle cx="35" cy="20" r="8" fill="#111111"/>
    
    <!-- Detalhes -->
    <line x1="-50" y1="-20" x2="50" y2="-20" stroke="#00cc00" stroke-width="1.5"/>
    <line x1="-30" y1="-20" x2="-30" y2="10" stroke="#111111" stroke-width="1"/>
    <line x1="30" y1="-20" x2="30" y2="10" stroke="#111111" stroke-width="1"/>
  </g>
  
  <!-- Texto "CNH" pequeno -->
  <text x="96" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        fill="#00ff00" text-anchor="middle">CNH</text>
</svg>
